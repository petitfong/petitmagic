<style>

.wrap{max-width:980px;margin:0 auto;padding:24px 18px 48px}.hero{display:grid;grid-template-columns:1.3fr .7fr;gap:18px;align-items:stretch;margin-bottom:20px}.hero-main{background:#fff;border:1.5px solid var(--line);border-radius:22px;padding:25px;box-shadow:0 10px 30px rgba(0,0,0,.04)}.tag{font-size:11px;font-weight:800;letter-spacing:.16em;color:var(--gold);margin-bottom:9px}.title{font-family:'TmonMonsori',Pretendard,sans-serif;font-size:30px;font-weight:600;color:#111;line-height:1.25;letter-spacing:-.02em}.sub{font-size:14px;color:var(--sub);line-height:1.8;margin-top:10px}.hero-side{background:var(--deep);color:var(--cream);border-radius:22px;padding:22px;border:1.5px solid rgba(200,168,75,.4);display:flex;flex-direction:column;justify-content:space-between}.score-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.score-box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:13px}.score-num{font-family:'TmonMonsori',Pretendard,sans-serif;font-size:28px;color:var(--gold)}.score-label{font-size:12px;color:rgba(250,248,240,.74)}.leader-note{font-size:13px;line-height:1.8;color:rgba(250,248,240,.86)}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.level-card{border-radius:18px;border:1.5px solid var(--line);background:#fff;padding:18px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;min-height:174px}.level-card:hover:not(.locked){border-color:#C5E8DC;transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,122,84,.08)}.level-card.locked{opacity:.5;cursor:not-allowed}.level-card.done{border-color:var(--green);background:#F7FCF9}.level-card.active-level{border-color:var(--gold)}.lc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}.badge{font-size:10px;font-weight:800;letter-spacing:.1em;padding:5px 10px;border-radius:100px}.badge.unlocked{background:var(--mint);color:var(--green)}.badge.locked{background:#F0F0EC;color:#888880}.badge.done{background:var(--green);color:var(--cream)}.lc-xp{font-size:11px;color:var(--gold);font-weight:800}.lc-title{font-family:'TmonMonsori',Pretendard,sans-serif;font-size:18px;color:#111;margin-bottom:6px;line-height:1.35}.lc-sub{font-size:12.5px;color:var(--sub);line-height:1.65;margin-bottom:12px}.lc-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}.chip{font-size:10.5px;border:1px solid var(--line);border-radius:100px;padding:4px 8px;color:#666;background:#fff}.lc-prog{background:#F0F0EC;border-radius:100px;height:6px;overflow:hidden}.lc-prog-fill{height:100%;background:var(--green);border-radius:100px;transition:width .4s}.lc-prog-txt{font-size:11px;color:#888;margin-top:6px}.lc-done-mark{position:absolute;right:18px;bottom:18px;width:32px;height:32px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:var(--cream);font-size:14px}.lockline{font-size:11px;color:#888;margin-top:8px}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--sub);background:#fff;border:1.5px solid var(--line);border-radius:100px;padding:7px 14px;cursor:pointer;margin-bottom:18px;transition:all .15s}.back-btn:hover{border-color:#C5E8DC;color:var(--green)}.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:14px}.section-title{font-family:'TmonMonsori',Pretendard,sans-serif;font-size:25px;line-height:1.34}.section-sub{font-size:13px;color:var(--sub);line-height:1.65;margin-top:4px}.module-list{display:grid;gap:10px}.mod-card{border-radius:16px;border:1.5px solid var(--line);background:#fff;padding:17px;cursor:pointer;transition:all .15s}.mod-card:hover{border-color:#C5E8DC}.mod-card.done{border-color:var(--green);background:#F7FCF9}.mod-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}.mod-num{font-size:10px;font-weight:800;letter-spacing:.1em;color:#888}.mod-check{width:22px;height:22px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;display:none}.mod-card.done .mod-check{display:flex}.mod-title{font-size:15px;font-weight:800;color:#111;margin-bottom:4px}.mod-desc{font-size:12.5px;color:var(--sub);line-height:1.6}.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.primary-btn,.ghost-btn{width:100%;padding:14px;border-radius:14px;font-weight:800;cursor:pointer;transition:opacity .15s}.primary-btn{background:var(--green);color:var(--cream);border:none;font-family:'TmonMonsori',Pretendard,sans-serif;font-size:16px}.primary-btn:disabled{background:#E4E4DE;color:#888;cursor:not-allowed}.ghost-btn{background:#fff;color:var(--green);border:1.5px solid #C5E8DC;font-size:14px}.primary-btn:hover:not(:disabled),.ghost-btn:hover{opacity:.9}
.read-card{background:#fff;border:1.5px solid var(--line);border-radius:22px;padding:24px;box-shadow:0 10px 28px rgba(0,0,0,.035)}.read-title{font-family:'TmonMonsori',Pretendard,sans-serif;font-size:24px;margin-bottom:15px;line-height:1.35}.read-body{font-size:14.3px;color:#3f3f3b;line-height:1.9}.read-body p{margin-bottom:13px}.read-body strong{color:#111;font-weight:800}.box{border-radius:0 14px 14px 0;padding:14px 16px;margin:15px 0;font-size:13.5px;line-height:1.82;border-left:4px solid}.box.green{background:var(--mint);border-color:var(--green);color:#1A5C3A}.box.gold{background:#FFFBEF;border-color:var(--gold);color:#5A4010}.box.red{background:#FDE8E8;border-color:var(--red);color:#5A1A1A}.box.blue{background:#EAF2F8;border-color:var(--blue);color:#183C5A}.mini-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:14px 0}.mini{background:#FAFAF9;border:1px solid var(--line);border-radius:14px;padding:13px}.mini h4{font-size:13px;color:#111;margin-bottom:5px}.mini p,.mini li{font-size:12.5px;color:#555;line-height:1.65}.script{background:#111;color:#FAF8F0;border-radius:16px;padding:15px;margin:16px 0}.script .role{font-size:11px;color:var(--gold);font-weight:800;letter-spacing:.12em;margin-bottom:7px}.script p{font-size:13px;line-height:1.85;color:#EEE;margin-bottom:7px}.checklist{background:#fff;border:1.5px dashed #C5E8DC;border-radius:16px;padding:15px;margin:15px 0}.checklist li{margin-left:18px;margin-bottom:7px;font-size:13px;color:#444}.done-btn{width:100%;padding:15px;border-radius:14px;background:var(--green);color:var(--cream);border:none;font-family:'TmonMonsori',Pretendard,sans-serif;font-size:16px;font-weight:600;cursor:pointer;margin-top:18px}
.quiz-wrap{max-width:760px;margin:0 auto;padding:24px 18px}.quiz-card{background:#fff;border:1.5px solid var(--line);border-radius:22px;padding:24px}.quiz-prog{display:flex;gap:6px;margin-bottom:18px}.dot{flex:1;height:5px;border-radius:100px;background:#E4E4DE}.dot.done{background:var(--green)}.dot.active{background:var(--gold)}.qnum{font-size:11px;font-weight:800;letter-spacing:.1em;color:#888;margin-bottom:8px}.qtext{font-family:'TmonMonsori',Pretendard,sans-serif;font-size:20px;line-height:1.5;margin-bottom:18px}.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}.opt{border-radius:12px;border:1.5px solid var(--line);background:#fff;padding:14px 16px;cursor:pointer;font-size:14px;text-align:left;line-height:1.55}.opt:hover:not(:disabled){border-color:#C5E8DC;background:#F7FCF9}.opt.correct{border-color:var(--green);background:var(--mint);color:#1A5C3A}.opt.wrong{border-color:var(--red);background:#FDE8E8;color:#5A1A1A}.fb{border-radius:12px;padding:13px 15px;font-size:13px;line-height:1.75;margin-bottom:12px;display:none}.fb.show{display:block}.fb.ok{background:var(--mint);color:#1A5C3A}.fb.ng{background:#FDE8E8;color:#5A1A1A}.next-btn{width:100%;padding:14px;border-radius:14px;background:var(--green);color:var(--cream);border:none;font-family:'TmonMonsori',Pretendard,sans-serif;font-size:15px;cursor:pointer;display:none}.next-btn.show{display:block}
.complete-wrap{max-width:760px;margin:0 auto;padding:44px 18px;text-align:center}.complete-card{background:#fff;border:1.5px solid var(--line);border-radius:24px;padding:34px 24px}.complete-icon{font-size:58px;margin-bottom:13px}.complete-title{font-family:'TmonMonsori',Pretendard,sans-serif;font-size:28px;line-height:1.35}.complete-sub{font-size:14px;color:var(--sub);line-height:1.8;margin:12px 0 20px}.complete-xp{display:inline-flex;align-items:center;gap:10px;background:var(--deep);border-radius:14px;padding:14px 24px;margin-bottom:20px}.complete-xp-num{font-family:'TmonMonsori';font-size:28px;color:var(--gold)}.complete-xp-label{font-size:12px;color:rgba(250,248,240,.74);text-align:left;white-space:pre-line}
@media(max-width:760px){.hero{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.mini-grid{grid-template-columns:1fr}.action-row{grid-template-columns:1fr}.title{font-size:26px}.section-head{display:block}.header-inner{gap:8px}.xp-bar-bg{width:72px}}

<body>
<header class="header"><div class="header-inner"><div class="header-logo">PETIT DENTAL CLINIC · <em>리더 트레이닝 시스템</em></div><div class="xp-wrap"><div class="xp-bar-bg"><div class="xp-bar-fill" id="xpBarFill"></div></div><div class="xp-label" id="xpLabel">0 XP</div></div></div></header>
<div class="screen active" id="screenMap"><div class="wrap"><div class="hero"><div class="hero-main"><div class="tag">BASIC IS MAGIC · LEADER TRAINING</div><div class="title">쁘띠치과 리더를 위한<br>판단·상담·코칭 로드맵</div><div class="sub">단순 지식 암기가 아니라, 리더가 실제 진료 현장에서 <strong>상황을 읽고, 직원에게 설명하고, 환자에게 연결하고, 원장에게 보고</strong>할 수 있도록 설계한 심화 교육입니다.</div></div><div class="hero-side"><div class="leader-note">리더의 기준은 “많이 아는 사람”이 아니라, <strong>현장을 안정시키고 같은 철학으로 팀을 움직이는 사람</strong>입니다.</div><div class="score-row"><div class="score-box"><div class="score-num" id="totalXpNum">0</div><div class="score-label">XP 획득</div></div><div class="score-box"><div class="score-num" id="totalLvNum">0</div><div class="score-label">레벨 완료</div></div></div></div></div><div class="grid" id="levelList"></div></div></div>
<div class="screen" id="screenLearn"><div class="wrap"><button class="back-btn" onclick="showMap()">← 로드맵으로</button><div class="section-head"><div><div class="tag" id="learnTag"></div><div class="section-title" id="learnTitle"></div><div class="section-sub" id="learnSub"></div></div></div><div class="module-list" id="modList"></div><div class="action-row"><button class="primary-btn" id="quizStartBtn" onclick="startQuiz()">리더 판단 퀴즈 →</button><button class="ghost-btn" onclick="showMap()">로드맵 보기</button></div></div></div>
<div class="screen" id="screenRead"><div class="wrap"><button class="back-btn" onclick="showLearn()">← 모듈 목록으로</button><div class="read-card"><div class="tag" id="readTag"></div><div class="read-title" id="readTitle"></div><div class="read-body" id="readBody"></div><button class="done-btn" onclick="markDone()">이 모듈 학습 완료 ✓</button></div></div></div>
<div class="screen" id="screenQuiz"><div class="quiz-wrap"><button class="back-btn" onclick="showLearn()">← 돌아가기</button><div class="quiz-card"><div class="quiz-prog" id="quizProg"></div><div class="qnum" id="quizNum"></div><div class="qtext" id="quizText"></div><div class="opts" id="quizOpts"></div><div class="fb" id="quizFb"></div><button class="next-btn" id="nextBtn" onclick="nextQ()">다음 →</button></div></div></div>
<div class="screen" id="screenComplete"><div class="complete-wrap"><div class="complete-card"><div class="complete-icon" id="completeIcon">🎉</div><div class="tag" id="completeTag"></div><div class="complete-title" id="completeTitle"></div><div class="complete-sub" id="completeSub"></div><div class="complete-xp"><div class="complete-xp-num" id="completeXpNum"></div><div class="complete-xp-label" id="completeXpLabel"></div></div><button class="primary-btn" onclick="showMap()">로드맵으로 돌아가기</button><button class="ghost-btn" id="failBtn" style="display:none;margin-top:10px" onclick="showLearn()">모듈 다시 읽기</button></div></div></div>
<script>
const LEVELS=[
{id:0,title:'쁘띠치과 철학을 리더 언어로 설명하기',sub:'Basic is Magic · 자연치아 · 바른턱얼굴 · 마음편안한 치과',xp:120,tags:['철학','브랜드','응대 기준'],modules:[
{title:'리더가 먼저 잡아야 할 기준',desc:'철학을 감성 문구가 아니라 의사결정 기준으로 바꿉니다.',tag:'LEVEL 1 · 철학',body:`<p>리더 트레이닝의 첫 기준은 <strong>쁘띠치과의 철학을 업무 판단 언어로 바꾸는 것</strong>입니다. “기본이 기적이다”는 좋은 문구가 아니라, 진료실에서 우선순위를 정하는 기준입니다.</p><div class="box green"><strong>리더의 번역</strong><br>기본 = 호흡·입술·혀·자세·씹기·삼키기·교합·위생·정기관리<br>기적 = 치료 후 재발을 줄이고, 자연치아를 오래 살리고, 환자가 자기 몸을 이해하게 되는 결과</div><p>따라서 리더는 환자가 충치로 오든, 교정으로 오든, 임플란트 상담으로 오든 공통 질문을 유지해야 합니다. <strong>“이 증상이 왜 반복되었는가?” “이 환자의 기능은 어떤가?” “치료 후 어떻게 유지할 것인가?”</strong></p><div class="script"><div class="role">리더 브리핑 예시</div><p>“우리 치과는 증상만 처리하는 곳이 아니라 원인을 같이 보는 곳입니다. 오늘 신환도 주호소는 충치지만, 입호흡·혀 위치·씹는 습관·교합 간섭을 함께 확인해야 합니다.”</p></div>`},
{title:'자연치아살리기와 교합치료를 하나의 흐름으로 연결하기',desc:'MTA·엠도게인·교합·바른미소디자인을 분리하지 않고 설명합니다.',tag:'LEVEL 1 · 철학',body:`<p>쁘띠치과의 자연치아살리기는 단순히 “발치하지 않는다”가 아닙니다. <strong>치아가 망가진 원인을 줄여서 다시 같은 문제가 반복되지 않도록 하는 치료 철학</strong>입니다.</p><div class="mini-grid"><div class="mini"><h4>자연치아살리기</h4><p>충치, 파절, 치근단 병소, 치주 손상에서 발치 전 보존 가능성을 먼저 확인합니다.</p></div><div class="mini"><h4>바른턱얼굴 교합치료</h4><p>치아에 과부하가 걸리는 구조적·기능적 원인을 찾아 교합을 안정화합니다.</p></div><div class="mini"><h4>바른미소디자인 훈련</h4><p>입술·혀·호흡·자세·씹고 삼키기를 바르게 만들어 치료 결과를 유지합니다.</p></div><div class="mini"><h4>정기관리</h4><p>바이오필름, 교합 변화, 습관 재발을 지속적으로 확인합니다.</p></div></div><div class="box gold"><strong>리더 핵심 문장</strong><br>“치아를 살린다는 것은 그 치아에 계속 무리가 가는 원인까지 줄이는 것입니다.”</div>`},
{title:'환자에게 철학을 과하지 않게 설명하는 법',desc:'철학 설명이 길어지지 않도록 30초·1분·3분 버전으로 훈련합니다.',tag:'LEVEL 1 · 상담',body:`<p>리더는 철학을 길게 설명하는 사람이 아니라, 상황에 맞는 길이로 조절하는 사람입니다. 직원이 환자 앞에서 너무 많은 이야기를 하면 신뢰보다 혼란이 생깁니다.</p><div class="box green"><strong>30초 버전</strong><br>“쁘띠치과는 치아만 보는 것이 아니라, 치아가 왜 망가졌는지 원인까지 같이 봅니다. 그래서 교합, 호흡, 혀, 자세, 씹고 삼키기까지 함께 확인합니다.”</div><div class="box gold"><strong>1분 버전</strong><br>“충치나 파절이 반복되는 분들은 단순히 양치 문제만이 아니라 씹는 힘, 입호흡, 혀 위치, 교합 간섭이 같이 있는 경우가 많습니다. 그래서 진단을 통해 원인을 확인하고, 필요한 경우 자연치아살리기와 교합치료, 기능훈련을 함께 계획합니다.”</div><div class="box blue"><strong>3분 버전</strong><br>신환 상담, 보호자 상담, 재교정 상담처럼 환자가 충분히 들을 준비가 되어 있을 때 사용합니다. 증상 → 원인 → 진단 필요성 → 치료 방향 → 유지관리 순서로 설명합니다.</div>`},
{title:'리더 체크포인트: 철학이 현장에서 무너지는 순간',desc:'직원이 자주 놓치는 표현과 금지 문장을 정리합니다.',tag:'LEVEL 1 · 리더 코칭',body:`<p>리더는 직원의 말 한마디가 쁘띠치과의 철학과 맞는지 확인해야 합니다.</p><div class="box red"><strong>피해야 할 말</strong><br>“그냥 충치 치료만 하시면 돼요.”<br>“교합은 나중에 생각하시면 돼요.”<br>“장치만 잘 끼면 끝나요.”<br>“유지장치 안 하면 다 돌아가요.”</div><div class="box green"><strong>바꿔 말하기</strong><br>“오늘은 충치 치료가 필요하지만, 왜 반복되는지도 같이 확인해보면 좋습니다.”<br>“교합은 치아에 힘이 어떻게 가는지 보는 과정이라 자연치아를 오래 쓰는 데 중요합니다.”<br>“장치와 함께 입술·혀·호흡·자세 습관이 바뀌어야 결과가 오래 갑니다.”</div><ul class="checklist"><li>환자에게 겁을 주지 않았는가?</li><li>원장 진단 전 확정 표현을 하지 않았는가?</li><li>치료 철학을 환자의 주호소와 연결했는가?</li><li>직원이 같은 표현을 반복할 수 있도록 짧은 문장으로 정리했는가?</li></ul>`}
],quiz:[
{q:'리더가 “기본이 기적이다”를 현장 언어로 바꿀 때 가장 적절한 설명은?',opts:['치료비보다 기본 검사가 더 중요하다는 뜻','입술·혀·호흡·자세·씹고 삼키기·교합 같은 기본 기능이 치료 결과와 유지에 영향을 준다는 뜻','기본 치료만 하면 모든 질환이 낫는다는 뜻','환자가 이해하기 어려우므로 설명하지 않는 문구'],ans:1,fb:'철학은 감성 문구가 아니라 기능·원인·유지관리 기준으로 번역되어야 합니다.'},
{q:'철학 설명에서 리더가 가장 경계해야 할 것은?',opts:['짧게 설명하는 것','환자의 주호소와 연결하는 것','진단 전 확정 표현과 과장 설명','직원에게 공통 문장을 알려주는 것'],ans:2,fb:'원장 진단 전 확정·과장 표현은 피해야 합니다. 가능성, 확인 필요성, 진단 연결로 말해야 합니다.'},
{q:'자연치아살리기를 가장 잘 설명한 문장은?',opts:['발치를 절대 하지 않는 치료','충치 치료를 미루는 치료','치아를 살릴 가능성을 먼저 보고, 반복 원인까지 줄이는 치료','임플란트를 하지 않는 치료'],ans:2,fb:'자연치아살리기는 보존 가능성 확인과 반복 원인 조절까지 포함합니다.'}
]},
{id:1,title:'교합질환을 리더 수준으로 분류하기',sub:'증상·원인·진료 연결 · 위험도 판단',xp:150,tags:['교합','분류','위험도'],modules:[
{title:'교합을 증상 언어로 읽기',desc:'환자의 말 속에서 교합 신호를 찾아냅니다.',tag:'LEVEL 2 · 교합 판단',body:`<p>환자는 “교합이 나빠요”라고 오지 않습니다. “이가 시려요”, “자꾸 깨져요”, “턱이 아파요”, “얼굴이 틀어진 것 같아요”라고 말합니다. 리더는 이 표현들을 <strong>교합 신호</strong>로 번역할 수 있어야 합니다.</p><div class="mini-grid"><div class="mini"><h4>치아 신호</h4><p>시림, 마모, 파절, 흔들림, 반복 보철 탈락, 특정 치아만 아픔</p></div><div class="mini"><h4>턱관절 신호</h4><p>딱딱 소리, 입 벌릴 때 통증, 아침 턱 뻐근함, 이갈이·이악물기</p></div><div class="mini"><h4>얼굴 신호</h4><p>입꼬리 비대칭, 턱끝 틀어짐, 한쪽 광대·턱선 발달, 사진 비대칭</p></div><div class="mini"><h4>몸 신호</h4><p>목·어깨 통증, 두통, 거북목, 한쪽 씹기, 자세 틀어짐</p></div></div><div class="box gold">리더는 “증상명”보다 “패턴”을 봅니다. 반복·한쪽·파절·시림·턱관절·자세가 같이 있으면 교합 진단 연결 우선순위가 올라갑니다.</div>`},
{title:'어린이 부정교합 리더 분류표',desc:'주걱턱·돌출·무턱·양악돌출·안면비대칭을 성장 발달 관점으로 봅니다.',tag:'LEVEL 2 · 소아 성장',body:`<p>어린이 부정교합은 치아 배열 문제가 아니라 성장 발달의 신호입니다. 리더는 보호자가 “나중에 교정하면 되죠?”라고 말할 때, <strong>언제 기다리면 안 되는지</strong> 구분해야 합니다.</p><div class="box green"><strong>주걱턱·반대교합</strong><br>아래턱이 나와 보이거나 앞니·어금니가 반대로 물리는 경우. 위턱 성장 부족, 아래턱 전방 위치, 혀·호흡 문제가 함께 있을 수 있어 조기 확인이 중요합니다.</div><div class="box green"><strong>돌출·무턱·양악돌출</strong><br>입술이 잘 안 다물어지고 입호흡, 혀 위치 저하, 아래턱 성장 부족이 동반될 수 있습니다. 단순 치아 돌출인지 골격·기능 문제인지 진단이 필요합니다.</div><div class="box green"><strong>안면비대칭</strong><br>습관뿐 아니라 치아 맹출의 비대칭, 한쪽 어금니 반대교합, 작은어금니의 설측 경사, 치아 개수 불균형, 한쪽 미맹출 같은 발달 원인이 큽니다.</div><div class="script"><div class="role">보호자 상담 문장</div><p>“아이들은 이가 나는 과정에서 한쪽만 다르게 물리거나, 치아가 혀 쪽으로 쓰러지거나, 한쪽 치아가 늦게 나오는 경우가 있습니다. 그래서 얼굴 비대칭은 습관만이 아니라 성장 발달 문제로도 확인해야 합니다.”</p></div>`},
{title:'교합질환 위험도 3단계',desc:'접수·상담·진료팀이 같은 기준으로 긴급도를 판단합니다.',tag:'LEVEL 2 · 위험도',body:`<p>리더는 모든 교합 문제를 같은 강도로 설명하지 않습니다. 위험도에 따라 안내의 깊이와 진료 연결 우선순위를 조절합니다.</p><div class="mini-grid"><div class="mini"><h4>주의 단계</h4><p>가끔 시림, 가벼운 이갈이, 한쪽 씹기 습관, 입호흡 의심. 자가체크와 정밀진단 안내.</p></div><div class="mini"><h4>경고 단계</h4><p>반복 파절, 보철 탈락, 턱관절 통증, 두통·목어깨 통증 동반. 원장 진단 연결.</p></div><div class="mini"><h4>고위험 단계</h4><p>치아 흔들림, 급성 통증, 진행성 치주염, 개구 제한, 아이의 반대교합·비대칭. 우선 예약 조정.</p></div><div class="mini"><h4>리더 보고</h4><p>증상, 기간, 반복 여부, 한쪽성, 기존 치료 이력, 환자 불안도를 짧게 정리해 원장에게 보고.</p></div></div><div class="box blue"><strong>보고 공식</strong><br>“주호소 + 반복성 + 한쪽성 + 동반증상 + 환자 기대” 순서로 보고합니다.</div>`},
{title:'교합 설명에서 가위 비유 사용하기',desc:'힘들이지 않고 씹고 삼키는 교합을 일반인이 이해하도록 설명합니다.',tag:'LEVEL 2 · 설명 기술',body:`<p>교합은 일반 환자에게 어렵습니다. 리더는 환자가 이해할 수 있는 비유를 사용하되, 과장하지 않아야 합니다.</p><div class="box gold"><strong>가위 비유</strong><br>날이 어긋난 가위는 같은 힘을 줘도 고기가 잘 잘리지 않고 손에 힘이 많이 들어갑니다. 반대로 날이 잘 맞는 가위는 큰 힘 없이도 부드럽게 잘립니다. 교합도 비슷합니다. 치아가 효율적으로 맞으면 씹고 삼키는 데 큰 힘이 들지 않습니다.</div><div class="script"><div class="role">환자 설명 예시</div><p>“좋은 교합은 좋은 가위처럼 큰 힘이 들지 않는 상태입니다. 특정 치아에 힘이 몰리면 시림, 파절, 턱관절 불편이 반복될 수 있어요. 그래서 치아만 보는 것이 아니라 힘의 방향도 함께 봅니다.”</p></div><ul class="checklist"><li>비유 후 반드시 환자의 증상과 연결한다.</li><li>“무조건 교합 때문”이라고 말하지 않는다.</li><li>정확한 판단은 원장 진단 후 가능하다고 안내한다.</li></ul>`}
],quiz:[
{q:'환자가 “이가 자꾸 깨지고 보철이 떨어져요”라고 할 때 리더가 우선 떠올릴 관점은?',opts:['환자가 딱딱한 음식을 좋아한다','교합 간섭이나 특정 치아 과부하 가능성','보철 재료가 무조건 나쁘다','양치질 부족만 설명한다'],ans:1,fb:'반복 파절·탈락은 특정 치아에 힘이 몰리는 교합 신호일 수 있습니다.'},
{q:'어린이 안면비대칭 설명으로 가장 적절한 것은?',opts:['대부분 습관이므로 지켜보면 된다','아이들은 비대칭이 있으면 무조건 수술해야 한다','습관도 있지만 치아 맹출, 한쪽 반대교합, 미맹출, 치아 개수 불균형 등 발달 원인이 있을 수 있다','성장기에는 진단이 의미 없다'],ans:2,fb:'어린이 비대칭은 성장 발달과 치아 맹출 문제를 반드시 확인해야 합니다.'},
{q:'교합질환 리더 보고 공식에 포함되지 않아도 되는 것은?',opts:['주호소','반복성·한쪽성','환자의 동반증상','직원의 개인적 추측'],ans:3,fb:'보고는 관찰 사실 중심으로 해야 하며 개인적 추측은 줄여야 합니다.'}
]},
{id:2,title:'장치·진단·치료 흐름을 정확히 안내하기',sub:'교합안정장치 · 성장교정 · 4D입체교정 · 진단비 안내',xp:170,tags:['장치','진단','비용 안내'],modules:[
{title:'교합안정장치와 4D입체교정의 차이',desc:'보호하는 장치와 변화시키는 장치를 구분합니다.',tag:'LEVEL 3 · 장치',body:`<p>리더가 반드시 구분해야 할 핵심은 <strong>교합안정장치는 보호, 4D입체교정은 변화</strong>입니다. 이 차이를 모르면 환자에게 치료 순서를 잘못 안내하게 됩니다.</p><div class="mini-grid"><div class="mini"><h4>교합안정장치</h4><p>턱관절과 치아를 보호하고 근육 긴장을 낮춥니다. 뼈나 치아를 크게 변화시키는 장치가 아닙니다.</p></div><div class="mini"><h4>4D입체교정</h4><p>턱뼈의 위치·폭·공간과 치아 이동을 함께 고려하는 변화 장치입니다.</p></div><div class="mini"><h4>순서</h4><p>턱관절이 불안정하면 먼저 안정장치로 보호 후 교정 계획을 세웁니다.</p></div><div class="mini"><h4>공통점</h4><p>둘 다 바른미소디자인 훈련이 병행되어야 결과가 유지됩니다.</p></div></div><div class="script"><div class="role">직원 코칭 문장</div><p>“안정장치는 현재 턱과 치아를 보호하는 장치이고, 4D교정은 구조를 바꾸는 장치입니다. 환자에게 두 장치를 같은 장치처럼 설명하면 안 됩니다.”</p></div>`},
{title:'성장교정과 4D교정 장치 맵',desc:'어린이·청소년·성인별 장치 목적을 정리합니다.',tag:'LEVEL 3 · 장치 맵',body:`<p>장치 이름을 외우는 것보다 <strong>장치가 어떤 방향의 성장을 돕는지</strong> 이해하는 것이 중요합니다.</p><div class="box green"><strong>성장교정 장치</strong><br>Biobloc, EFLine, 프리올소 등은 성장기 아이의 턱 성장 방향, 혀 위치, 입술 폐쇄, 코호흡과 연결해서 봅니다.</div><div class="box green"><strong>Class II · 무턱·돌출</strong><br>Twin Block 계열은 아래턱의 위치와 성장 방향을 유도하는 데 활용됩니다.</div><div class="box green"><strong>Class III · 주걱턱·반대교합</strong><br>Han’s 3-Way, 상악 확장 장치 등으로 위턱 성장 부족, 폭 부족, 반대교합을 평가합니다.</div><div class="box green"><strong>폭 문제 · 좁은 상악</strong><br>성장기에는 RPE, 성인에서는 MARPE 등으로 확장 가능성을 진단합니다.</div><div class="box gold">리더는 장치를 처방하지 않습니다. 대신 “어떤 문제를 확인하기 위해 진단이 필요한지”를 환자에게 설명합니다.</div>`},
{title:'진단비 안내 리더 스크립트',desc:'비용 방어가 아니라 진단 가치 설명으로 전환합니다.',tag:'LEVEL 3 · 진단 안내',body:`<p>진단비 안내는 리더에게 민감한 영역입니다. 단순히 가격을 말하면 환자는 “비싸다/싸다”로 판단합니다. 리더는 <strong>진단이 치료 방향을 결정한다는 가치</strong>를 설명해야 합니다.</p><div class="box green"><strong>설명 구조</strong><br>① 현재 증상 확인 → ② 원인 가능성 설명 → ③ 필요한 검사 범위 안내 → ④ 진단 후 치료 순서 결정 → ⑤ 치료 시작 시 비용 포함 여부 안내</div><div class="script"><div class="role">환자 안내 예시</div><p>“교합 진단은 치아 배열만 보는 검사가 아니라, 얼굴 대칭, 턱관절, 기도, 혀 위치, 자세, 구강스캔, 엑스레이와 CT를 함께 보고 치료 순서를 정하는 과정입니다. 원인을 모르고 치료하면 재발 가능성이 높기 때문에 먼저 진단이 필요합니다.”</p></div><div class="box red"><strong>피해야 할 표현</strong><br>“일단 진단비부터 내셔야 해요.” “다 해봐야 알아요.” “원장님이 보시면 됩니다.”</div>`},
{title:'장치 착용 순응도 관리',desc:'장치를 끼지 않는 환자·아이·보호자에게 리더가 개입하는 방식입니다.',tag:'LEVEL 3 · 리더 개입',body:`<p>장치 치료의 실패는 장치 자체보다 착용 순응도에서 생기는 경우가 많습니다. 리더는 야단치는 사람이 아니라 <strong>실행 가능한 환경을 만드는 코치</strong>가 되어야 합니다.</p><div class="mini-grid"><div class="mini"><h4>확인</h4><p>실제 착용 시간, 빠지는 시간대, 통증, 말하기 불편감, 가족 협조 여부</p></div><div class="mini"><h4>해석</h4><p>환자가 게을러서가 아니라 루틴이 설계되지 않은 경우가 많습니다.</p></div><div class="mini"><h4>재설계</h4><p>수면 전, 숙제 시간, 영상 시청 시간 등 고정 루틴에 장치 착용을 붙입니다.</p></div><div class="mini"><h4>기록</h4><p>착용표, 보호자 체크, 다음 내원 시 피드백을 연결합니다.</p></div></div><div class="script"><div class="role">보호자 상담 예시</div><p>“장치는 많이 끼라는 말보다 언제 끼는지가 정해져야 성공합니다. 오늘부터는 잠들기 30분 전부터 장치를 끼고, 아침에 보호자가 한 번 확인하는 방식으로 해보겠습니다.”</p></div>`}

{id:3,title:'상담 흐름을 설계하는 리더',sub:'초진·재진·비용 문의·불만 상황 응대',xp:190,tags:['상담','스크립트','상황판단'],modules:[
{title:'상담의 5단계 구조',desc:'듣기–정리–연결–선택지–다음 행동으로 상담을 정리합니다.',tag:'LEVEL 4 · 상담 구조',body:`<p>리더 상담은 친절한 설명보다 구조가 중요합니다. 구조가 없으면 말은 많아지고 환자는 결정하지 못합니다.</p><div class="box green"><strong>5단계 상담 구조</strong><br>1. 듣기: 환자의 두려움과 기대 확인<br>2. 정리: 증상과 반복 패턴을 한 문장으로 요약<br>3. 연결: 쁘띠치과 철학과 필요한 진단으로 연결<br>4. 선택지: 오늘 가능한 단계와 추후 가능성을 구분<br>5. 다음 행동: 예약, 검사, 원장 상담, 준비사항을 명확히 안내</div><div class="script"><div class="role">상담 요약 예시</div><p>“말씀을 정리하면, 오른쪽 어금니가 반복해서 깨지고 최근 턱도 불편하신 상황입니다. 이런 경우 단순히 치아만 다시 때우기보다 힘이 왜 몰리는지 교합까지 확인하는 것이 좋습니다. 오늘은 원장님 진단 후 필요한 검사 범위를 안내드리겠습니다.”</p></div>`},
{title:'임플란트 30만원 광고 문의 응대',desc:'가격 공격을 방어하지 않고 전체 비용·진단·책임으로 전환합니다.',tag:'LEVEL 4 · 비용 문의',body:`<p>“밖에는 임플란트 30만원이라고 하던데요?”라는 질문은 가격 비교가 아니라 불안 확인입니다. 리더는 타 치과를 비난하지 않고 <strong>전체 비용과 치료 책임</strong>으로 대화를 전환해야 합니다.</p><div class="box green"><strong>핵심 메시지</strong><br>임플란트는 한 개 가격보다 진단, 뼈 상태, 발치 여부, 뼈이식 여부, 보철, 정기관리까지 포함한 전체 비용과 치료 계획이 중요합니다.</div><div class="script"><div class="role">응대 예시</div><p>“광고에 보이는 금액은 보통 일부 항목만 표시되는 경우가 있어요. 실제로는 뼈 상태, 발치 여부, 뼈이식, 보철 종류, 사후관리까지 확인해야 전체 비용이 나옵니다. 쁘띠치과에서는 먼저 현재 뼈와 교합 상태를 보고 오래 쓸 수 있는 계획인지 설명드립니다.”</p></div><div class="box red"><strong>금지</strong><br>“그런 건 다 사기예요.” “싸구려라 그래요.” “우리는 비싸요.”</div>`},
{title:'불만·불안 환자 안정화',desc:'감정이 올라온 환자를 방어하지 않고 안정화합니다.',tag:'LEVEL 4 · 컴플레인',body:`<p>리더는 불만을 해결하기 전에 환자의 신경계를 안정시켜야 합니다. 사실관계 설명을 먼저 하면 환자는 “변명한다”고 느낄 수 있습니다.</p><div class="box green"><strong>3문장 안정화</strong><br>1. “불편하셨겠어요.” — 감정 인정<br>2. “어떤 부분이 가장 걱정되셨는지 먼저 듣겠습니다.” — 통제감 회복<br>3. “확인 후 원장님께 정확히 보고드리고 다시 안내드리겠습니다.” — 절차 제시</div><div class="mini-grid"><div class="mini"><h4>해야 할 것</h4><p>감정 인정, 메모, 사실 확인, 재안내 시간 약속, 원장 보고</p></div><div class="mini"><h4>하지 말 것</h4><p>즉시 반박, 직원 탓, 타 치과 탓, 비용 방어, 확정 약속</p></div></div><div class="script"><div class="role">리더 개입 예시</div><p>“말씀하신 부분은 제가 정확히 기록하겠습니다. 지금 바로 단정해서 말씀드리기보다 차트와 진료 내용을 확인하고 원장님께 보고드린 뒤 안내드리는 것이 정확합니다.”</p></div>`},
{title:'상담 후 원장 보고 양식',desc:'상담 내용을 진료 판단에 도움이 되는 정보로 압축합니다.',tag:'LEVEL 4 · 보고',body:`<p>리더의 보고는 길면 안 됩니다. 원장이 바로 판단할 수 있도록 구조화해야 합니다.</p><div class="box blue"><strong>SOAP-lite 보고</strong><br>S: 환자가 말한 주호소와 감정<br>O: 관찰 가능한 객관 정보 — 부위, 기간, 반복, 사진·엑스레이, 기존 치료<br>A: 리더가 본 우선 확인점 — 교합, 통증, 비용 불안, 착용 순응도 등<br>P: 필요한 다음 행동 — 진단, 추가 촬영, 상담, 예약 조정</div><div class="script"><div class="role">보고 예시</div><p>“원장님, 40대 여성 신환입니다. 오른쪽 아래 어금니가 세 번째 파절됐고 보철 탈락 경험이 있습니다. 턱은 아침에 뻐근하다고 합니다. 비용보다 ‘또 깨질까 봐’ 불안이 큽니다. 교합 과부하 여부와 자연치아 보존 가능성 설명이 필요해 보입니다.”</p></div>`}
],quiz:[
{q:'임플란트 30만원 광고 문의에 가장 적절한 응대 방향은?',opts:['타 치과를 강하게 비판한다','광고 가격과 실제 전체 비용의 차이, 진단·뼈상태·보철·관리까지 설명한다','우리도 맞춰주겠다고 한다','가격 이야기를 피한다'],ans:1,fb:'가격 문의는 전체 치료계획과 책임, 관리 기준으로 전환해야 합니다.'},

{id:4,title:'직원 코칭과 브리핑을 설계하기',sub:'신입 교육 · 피드백 · 역할 분담 · 팀 브리핑',xp:210,tags:['코칭','브리핑','팀 운영'],modules:[
{title:'리더의 피드백 공식',desc:'혼내는 피드백이 아니라 행동이 바뀌는 피드백을 설계합니다.',tag:'LEVEL 5 · 코칭',body:`<p>리더의 피드백은 감정 표현이 아니라 행동 수정입니다. 직원이 방어하지 않고 바꿀 수 있도록 <strong>관찰–영향–기준–다음 행동</strong>으로 말합니다.</p><div class="box green"><strong>OICN 피드백</strong><br>O Observation: 관찰한 사실<br>I Impact: 그 행동이 환자·팀에 준 영향<br>C Criterion: 쁘띠치과 기준<br>N Next: 다음 행동</div><div class="script"><div class="role">예시</div><p>“아까 환자 앞에서 ‘교합은 나중에 해도 된다’고 말한 것을 들었어요. 환자는 충치만 치료하면 된다고 이해할 수 있습니다. 우리 기준은 반복 원인을 함께 확인하는 것입니다. 다음부터는 ‘오늘 치료와 별개로 반복 원인은 원장님이 함께 확인해주실 거예요’라고 말해주세요.”</p></div>`},
{title:'신입 4주 온보딩 로드맵',desc:'신입이 철학·동선·진료 흐름을 순서대로 익히게 합니다.',tag:'LEVEL 5 · 신입 교육',body:`<p>신입 교육은 한 번에 몰아서 설명하면 실패합니다. 리더는 4주 단위로 나눠야 합니다.</p><div class="mini-grid"><div class="mini"><h4>1주차: 관찰</h4><p>쁘띠치과 철학, 환자 동선, 체어 준비, 멸균, 기본 응대 문장</p></div><div class="mini"><h4>2주차: 보조</h4><p>진료별 준비물, 차팅 흐름, 사진·스캔 보조, 환자 안내</p></div><div class="mini"><h4>3주차: 설명</h4><p>교합·장치·진단비·바른미소디자인 기본 설명을 자기 말로 연습</p></div><div class="mini"><h4>4주차: 판단</h4><p>환자 유형 분류, 원장 보고, 불안 환자 응대, 리콜·유지관리 연결</p></div></div><ul class="checklist"><li>매일 5분: 오늘 배운 것 1개 말하기</li><li>매주 15분: 리더와 롤플레이</li><li>4주차: 실제 상황 보고 테스트</li></ul>`},
{title:'아침 브리핑과 마감 브리핑',desc:'바쁜 진료실에서 같은 방향으로 움직이기 위한 짧은 회의법입니다.',tag:'LEVEL 5 · 브리핑',body:`<p>브리핑은 길게 하는 회의가 아니라, 오늘의 위험요소를 미리 제거하는 장치입니다.</p><div class="box green"><strong>아침 브리핑 7분</strong><br>① 오늘 신환/고위험 환자<br>② 교합·장치·수술·상담 포인트<br>③ 체어타임 길어질 환자<br>④ 담당자 배치<br>⑤ 원장에게 미리 확인할 것</div><div class="box gold"><strong>마감 브리핑 7분</strong><br>① 차팅·수납·청구 확인<br>② 환자 불만/불안 기록<br>③ 다음 예약 연결 누락 확인<br>④ 내일 준비물·촬영·장치 확인<br>⑤ 오늘 개선할 점 1개</div><div class="script"><div class="role">리더 멘트</div><p>“오늘은 장치 설명이 필요한 보호자가 두 분 있습니다. 설명은 제가 먼저 들어가고, 민진 선생님은 착용시간과 관리법을 이어서 안내해주세요.”</p></div>`},
{title:'역할 분담과 책임선',desc:'리더가 모든 일을 하는 것이 아니라 책임자를 세우는 법입니다.',tag:'LEVEL 5 · 운영',body:`<p>리더가 모든 일을 직접 하면 팀은 성장하지 않습니다. 리더는 업무를 나누되, 최종 책임선을 명확히 해야 합니다.</p><div class="mini-grid"><div class="mini"><h4>데스크</h4><p>예약, 신환 정보, 비용 안내, 대기 불안 감지, 문서·수납 보고</p></div><div class="mini"><h4>진료팀</h4><p>체어 준비, 촬영, 스캔, 장치 설명 보조, 진료 후 주의사항</p></div><div class="mini"><h4>리더</h4><p>고위험 환자 분류, 상담 흐름 설계, 직원 피드백, 원장 보고</p></div><div class="mini"><h4>원장</h4><p>진단, 치료계획, 최종 설명, 예외 상황 판단</p></div></div><div class="box red"><strong>주의</strong><br>매출·지출·민감한 비용 정보는 공개된 자리에서 이야기하지 않습니다. 지정 담당자가 조용한 공간에서 최종 보고합니다.</div>`}
],quiz:[

{q:'민감한 매출·지출 보고 원칙으로 적절한 것은?',opts:['모든 직원 앞에서 투명하게 공유','카톡방에 금액 공개','지정 담당자가 조용한 공간에서 최종 보고','환자 대기실에서 빠르게 보고'],ans:2,fb:'민감한 비용 정보는 지정 담당자가 조용한 공간에서 보고해야 합니다.'}
]},
{id:5,title:'실전 케이스 시뮬레이션',sub:'어린이 성장 · 교정 재발 · 발치 권유 · 장치 미착용',xp:230,tags:['시뮬레이션','판단 훈련','롤플레이'],modules:[
{title:'케이스 1: 충치로 온 아이, 사실은 성장교정 신호',desc:'보호자에게 부담 없이 성장검진을 연결합니다.',tag:'LEVEL 6 · 시뮬레이션',body:`<p><strong>상황</strong>: 7세 아이가 충치로 내원했습니다. 입이 자주 벌어져 있고, 보호자는 “이가 좀 삐뚤지만 나중에 교정하면 되죠?”라고 말합니다.</p><div class="box green"><strong>리더 판단</strong><br>충치 치료만 안내하지 않습니다. 입호흡, 입술 폐쇄, 혀 위치, 어금니 교합, 얼굴 대칭, 영구치 맹출 공간을 확인해야 합니다.</div><div class="script"><div class="role">보호자 설명</div><p>“오늘은 충치 치료가 필요하지만, 아이가 입을 벌리고 있는 습관과 치아가 나는 방향도 같이 봐야 합니다. 이 시기에는 턱 성장 방향을 잡아줄 수 있는 골든타임이 있어서 원장님이 교합과 성장 상태를 함께 확인해드리겠습니다.”</p></div><ul class="checklist"><li>충치 원인: 양치·식습관·입호흡·혀·교합 연결</li><li>보호자 불안 조절: “당장 큰 치료”가 아니라 “확인”으로 안내</li><li>다음 행동: 성장검진 또는 교합진단 예약 연결</li></ul>`},
{title:'케이스 2: 교정했는데 재발한 청년',desc:'유지장치 탓으로 단순화하지 않고 기능 원인으로 연결합니다.',tag:'LEVEL 6 · 시뮬레이션',body:`<p><strong>상황</strong>: 20대 환자가 “교정했는데 다시 돌출됐어요. 유지장치 때문인가요?”라고 묻습니다. 입술이 잘 다물어지지 않고 입호흡이 있습니다.</p><div class="box green"><strong>리더 판단</strong><br>유지장치만의 문제가 아닐 수 있습니다. 입술, 혀, 호흡, 자세, 삼키기 패턴이 바뀌지 않으면 치아는 다시 힘을 받습니다.</div><div class="script"><div class="role">환자 설명</div><p>“유지장치도 중요하지만, 입술이 잘 다물어지지 않거나 혀 위치가 낮고 입호흡이 있으면 치아가 다시 앞으로 밀리는 힘을 받을 수 있습니다. 그래서 재교정은 왜 돌아왔는지 원인 진단을 먼저 하는 것이 중요합니다.”</p></div><div class="box gold">설측 고정 유지장치가 있다고 해서 기능이 해결되는 것은 아닙니다. 쁘띠치과는 입술·혀·호흡·자세 기본기를 바탕으로 바르게 씹고 삼키는 마무리를 중요하게 봅니다.</div>`},
{title:'케이스 3: 발치 권유받고 온 중장년 환자',desc:'희망을 주되 과장하지 않는 자연치아살리기 상담입니다.',tag:'LEVEL 6 · 시뮬레이션',body:`<p><strong>상황</strong>: 50대 환자가 “다른 곳에서 뽑고 임플란트 하자고 했는데 살릴 수 있나요?”라고 묻습니다. 환자는 기대와 불안을 동시에 가지고 있습니다.</p><div class="box green"><strong>리더 판단</strong><br>“살릴 수 있다”고 확정하지 않습니다. “살릴 수 있는지 먼저 확인한다”가 정확한 표현입니다. 치주, 치근단, 파절, 교합 과부하, 전신상태를 함께 봐야 합니다.</div><div class="script"><div class="role">환자 설명</div><p>“쁘띠치과는 뽑기 전에 살릴 수 있는 가능성을 먼저 확인합니다. 다만 모든 치아를 살릴 수 있는 것은 아니기 때문에 엑스레이, 잇몸 상태, 뿌리 상태, 교합 힘까지 보고 원장님이 정확히 판단해드립니다.”</p></div><ul class="checklist"><li>확정 금지: “무조건 살립니다” 금지</li><li>가능성 제시: MTA, 치주재생, 교합조정 등은 진단 후</li><li>환자 감정: 이전 진단에 대한 불안과 실망을 먼저 인정</li></ul>`},
{title:'케이스 4: 장치를 안 끼는 아이와 지친 보호자',desc:'보호자 탓·아이 탓이 아니라 루틴 설계로 해결합니다.',tag:'LEVEL 6 · 시뮬레이션',body:`<p><strong>상황</strong>: 보호자가 “아이가 장치를 너무 안 껴요. 매일 싸워요”라고 말합니다. 아이는 말하기 불편하고 잠들기 전에 빼버립니다.</p><div class="box green"><strong>리더 판단</strong><br>의지 문제가 아니라 루틴 설계 실패입니다. 착용 시간, 불편한 시간대, 통증, 가족 역할, 보상 구조를 확인합니다.</div><div class="script"><div class="role">보호자 코칭</div><p>“매일 싸우는 방식은 오래가기 어렵습니다. 오늘부터는 잠들기 전 30분부터 끼우고, 아침에 보호자가 확인하는 식으로 시간을 정해보겠습니다. 불편한 부위가 있으면 장치 조정도 같이 확인하겠습니다.”</p></div><div class="box gold">리더의 목표는 “잘 끼세요”가 아니라 “끼게 되는 구조를 만드는 것”입니다.</div>`}
],quiz:[
{q:'충치로 온 7세 아이에게 리더가 함께 확인해야 할 항목으로 가장 적절한 것은?',opts:['충치 개수만 확인','입호흡·혀 위치·교합·영구치 맹출 공간·얼굴 대칭','보호자의 경제력','교정은 중학생 때까지 미루기'],ans:1,fb:'소아는 충치와 성장 신호를 함께 봐야 합니다.'},
{q:'교정 재발 환자에게 “유지장치 때문”으로만 설명하면 안 되는 이유는?',opts:['유지장치는 의미가 없어서','재발에는 입술·혀·호흡·자세·삼키기 등 기능 원인이 함께 있을 수 있어서','교정 재발은 치료 불가능해서','모든 재발은 환자 책임이라서'],ans:1,fb:'기능이 바뀌지 않으면 치아는 다시 힘을 받을 수 있습니다.'},
{q:'발치 권유 환자에게 가장 안전하고 철학에 맞는 문장은?',opts:['무조건 살릴 수 있습니다','다른 치과가 틀렸습니다','살릴 수 있는지 먼저 확인하겠습니다','임플란트가 더 나쁩니다'],ans:2,fb:'희망은 주되 확정하지 않고 진단으로 연결해야 합니다.'}
]},
{id:6,title:'리더 평가와 현장 실행',sub:'체크리스트 · 평가 루브릭 · 다음 액션',xp:250,tags:['평가','실행','루브릭'],modules:[
{title:'리더 역량 평가 루브릭',desc:'교육 완료 후 리더가 실제로 할 수 있어야 하는 기준입니다.',tag:'LEVEL 7 · 평가',body:`<p>리더 교육은 완료 체크가 아니라 <strong>현장에서 재현 가능한 역량</strong>으로 평가해야 합니다.</p><div class="mini-grid"><div class="mini"><h4>1. 철학 설명</h4><p>Basic is Magic, 자연치아살리기, 바른턱얼굴 교합치료를 1분 안에 설명한다.</p></div><div class="mini"><h4>2. 환자 분류</h4><p>주호소를 듣고 예방·자연치아·교합·장치·응급으로 분류한다.</p></div><div class="mini"><h4>3. 상담 구조</h4><p>듣기–정리–연결–선택지–다음 행동으로 상담을 마무리한다.</p></div><div class="mini"><h4>4. 직원 코칭</h4><p>관찰 사실 기반으로 다음 행동이 명확한 피드백을 준다.</p></div></div><div class="box gold">합격 기준: 설명 가능이 아니라, 실제 환자 상황에서 같은 흐름으로 반복 실행할 수 있는가입니다.</div>`},
{title:'리더 현장 체크리스트',desc:'매일·매주 리더가 확인할 운영 체크리스트입니다.',tag:'LEVEL 7 · 체크리스트',body:`<p>리더는 하루를 감으로 운영하지 않습니다. 체크리스트로 반복 가능한 시스템을 만듭니다.</p><div class="box green"><strong>매일 확인</strong><br>신환 주호소 / 고위험 환자 / 장치 환자 착용 상태 / 상담 필요 환자 / 차팅·청구·수납 누락 / 다음 예약 연결</div><div class="box green"><strong>매주 확인</strong><br>신입 교육 진도 / 상담 스크립트 오류 / 컴플레인 기록 / 리콜 누락 / 장치 미착용 환자 / 원장 피드백 반영</div><div class="box green"><strong>매월 확인</strong><br>진단 전환율 / 치료 완료 후 만족도 / 유지관리 연결률 / 직원별 강점·보완점 / 교육 콘텐츠 업데이트</div><ul class="checklist"><li>리더는 문제를 발견하면 기록한다.</li><li>기록된 문제는 담당자와 다음 행동으로 연결한다.</li><li>반복되는 문제는 개인 문제가 아니라 시스템 문제로 본다.</li></ul>`},
{title:'마지막 실습: 3분 리더 브리핑 작성',desc:'교육을 실제 브리핑 문장으로 전환합니다.',tag:'LEVEL 7 · 실습',body:`<p>마지막 모듈은 실제로 말할 수 있는 3분 브리핑을 만드는 것입니다.</p><div class="box blue"><strong>브리핑 구성</strong><br>1. 오늘의 진료 철학 한 문장<br>2. 오늘의 고위험 환자 1명<br>3. 오늘 직원들이 통일할 설명 문장 1개<br>4. 상담 시 조심할 표현 1개<br>5. 마감 때 확인할 항목 1개</div><div class="script"><div class="role">예시 브리핑</div><p>“오늘은 ‘치아 증상 뒤의 힘과 기능을 본다’는 기준으로 진료하겠습니다. 오전 신환은 반복 파절 환자라 단순 수복보다 교합 과부하 설명이 필요합니다. 직원들은 ‘왜 반복되는지 원장님이 함께 확인해드립니다’라는 문장으로 통일해주세요. 진단 전 ‘무조건 교합 때문’이라는 표현은 피합니다. 마감 때는 다음 예약 연결과 차팅 누락을 같이 확인하겠습니다.”</p></div><div class="box gold">이 브리핑을 매일 반복하면, 쁘띠치과의 철학이 직원 개인의 말투가 아니라 팀의 시스템이 됩니다.</div>`},
{title:'리더의 다음 성장 과제',desc:'교육 후에도 계속 성장하기 위한 개인 과제를 설정합니다.',tag:'LEVEL 7 · 성장',body:`<p>이 시스템을 완료한 리더는 다음 단계로 넘어갑니다. 목표는 더 많은 지식이 아니라, <strong>더 안정적인 현장 운영</strong>입니다.</p><div class="mini-grid"><div class="mini"><h4>개인 과제</h4><p>이번 달 내가 가장 개선할 상담 문장 1개 정하기</p></div><div class="mini"><h4>팀 과제</h4><p>직원들이 자주 틀리는 표현 3개를 통일 문장으로 바꾸기</p></div><div class="mini"><h4>환자 과제</h4><p>불안이 큰 환자에게 설명 후 이해 확인 질문하기</p></div><div class="mini"><h4>원장 보고 과제</h4><p>하루 1건 이상 SOAP-lite 방식으로 보고하기</p></div></div><div class="box green"><strong>리더 선언</strong><br>“나는 쁘띠치과의 철학을 환자에게 편안하게 전달하고, 직원이 같은 기준으로 움직이도록 돕는 사람이다.”</div>`}
],quiz:[
{q:'리더 교육의 최종 평가 기준으로 가장 적절한 것은?',opts:['내용을 한 번 읽었는가','퀴즈를 외워서 맞혔는가','실제 환자 상황에서 같은 상담·보고·코칭 흐름을 반복 실행할 수 있는가','치료계획을 직접 결정하는가'],ans:2,fb:'리더 역량은 현장 재현성으로 평가합니다.'},
{q:'반복되는 직원 실수에 대한 리더의 관점은?',opts:['개인 성격 문제로만 본다','시스템 문제 가능성을 함께 본다','무조건 혼낸다','기록하지 않는다'],ans:1,fb:'반복 문제는 개인과 시스템을 함께 봐야 개선됩니다.'},
{q:'3분 리더 브리핑에 들어가야 할 내용으로 적절하지 않은 것은?',opts:['오늘의 고위험 환자','통일할 설명 문장','조심할 표현','직원 개인 비난'],ans:3,fb:'브리핑은 방향과 기준을 맞추는 시간이지 개인 비난의 시간이 아닙니다.'}
]}

const MAX_XP=LEVELS.reduce((s,l)=>s+l.xp,0);let S={xp:0,done:[],modDone:[],curLv:0,curMod:0,qIdx:0,qScore:0,answered:false};
function save(){try{localStorage.setItem('petitLeaderTrainingV1',JSON.stringify(S));}catch(e){}}function load(){try{const d=localStorage.getItem('petitLeaderTrainingV1');if(d)S=JSON.parse(d)}catch(e){}}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');scrollTo(0,0)}function updateHeader(){const pct=Math.min(100,Math.round(S.xp/MAX_XP*100));document.getElementById('xpBarFill').style.width=pct+'%';document.getElementById('xpLabel').textContent=S.xp+' XP'}
function showMap(){updateHeader();document.getElementById('totalXpNum').textContent=S.xp;document.getElementById('totalLvNum').textContent=S.done.length;const list=document.getElementById('levelList');list.innerHTML='';LEVELS.forEach((lv,i)=>{const locked=i>0&&!S.done.includes(i-1),done=S.done.includes(i),mods=lv.modules.filter((m,mi)=>S.modDone.includes(`${i}-${mi}`)).length,pct=Math.round(mods/lv.modules.length*100);const c=document.createElement('div');c.className='level-card '+(locked?'locked ':'')+(done?'done ':'');c.innerHTML=`<div class="lc-top"><div class="badge ${done?'done':locked?'locked':'unlocked'}">${done?'완료':'LEVEL '+(i+1)}</div><div class="lc-xp">+${lv.xp} XP</div></div><div class="lc-title">${lv.title}</div><div class="lc-sub">${lv.sub}</div><div class="lc-meta">${lv.tags.map(t=>`<span class="chip">${t}</span>`).join('')}</div>${!done?`<div class="lc-prog"><div class="lc-prog-fill" style="width:${pct}%"></div></div><div class="lc-prog-txt">${mods}/${lv.modules.length} 모듈 완료</div>`:''}${locked?'<div class="lockline">🔒 이전 레벨 완료 후 열립니다</div>':''}${done?'<div class="lc-done-mark">✓</div>':''}`;if(!locked)c.onclick=()=>showLearn(i);list.appendChild(c)});show('screenMap')}
function showLearn(idx){if(idx!==undefined)S.curLv=idx;const lv=LEVELS[S.curLv];document.getElementById('learnTag').textContent='LEVEL '+(S.curLv+1)+' · '+lv.tags.join(' / ');document.getElementById('learnTitle').textContent=lv.title;document.getElementById('learnSub').textContent=lv.sub;const list=document.getElementById('modList');list.innerHTML='';lv.modules.forEach((m,i)=>{const done=S.modDone.includes(`${S.curLv}-${i}`);const c=document.createElement('div');c.className='mod-card '+(done?'done':'');c.innerHTML=`<div class="mod-top"><div class="mod-num">모듈 ${i+1}</div><div class="mod-check">✓</div></div><div class="mod-title">${m.title}</div><div class="mod-desc">${m.desc}</div>`;c.onclick=()=>showRead(i);list.appendChild(c)});const all=lv.modules.every((_,i)=>S.modDone.includes(`${S.curLv}-${i}`));const lvDone=S.done.includes(S.curLv);const btn=document.getElementById('quizStartBtn');btn.disabled=!all||lvDone;btn.textContent=lvDone?'레벨 완료됨 ✓':all?'리더 판단 퀴즈 →':'모듈 완료 후 퀴즈 가능';show('screenLearn')}
function showRead(i){S.curMod=i;const m=LEVELS[S.curLv].modules[i];document.getElementById('readTag').textContent=m.tag;document.getElementById('readTitle').textContent=m.title;document.getElementById('readBody').innerHTML=m.body;show('screenRead')}function markDone(){const id=`${S.curLv}-${S.curMod}`;if(!S.modDone.includes(id))S.modDone.push(id);save();showLearn()}
function startQuiz(){S.qIdx=0;S.qScore=0;S.answered=false;renderQ();show('screenQuiz')}function renderQ(){const quiz=LEVELS[S.curLv].quiz,q=quiz[S.qIdx];const prog=document.getElementById('quizProg');prog.innerHTML='';quiz.forEach((_,i)=>{const d=document.createElement('div');d.className='dot '+(i<S.qIdx?'done':i===S.qIdx?'active':'');prog.appendChild(d)});document.getElementById('quizNum').textContent=`문제 ${S.qIdx+1} / ${quiz.length}`;document.getElementById('quizText').textContent=q.q;const opts=document.getElementById('quizOpts');opts.innerHTML='';q.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='opt';b.textContent=o;b.onclick=()=>answerQ(i);opts.appendChild(b)});document.getElementById('quizFb').className='fb';document.getElementById('nextBtn').className='next-btn';S.answered=false}
function answerQ(idx){if(S.answered)return;S.answered=true;const q=LEVELS[S.curLv].quiz[S.qIdx],btns=document.querySelectorAll('.opt'),ok=idx===q.ans;btns.forEach(b=>b.disabled=true);btns[idx].classList.add(ok?'correct':'wrong');if(!ok)btns[q.ans].classList.add('correct');if(ok)S.qScore++;const fb=document.getElementById('quizFb');fb.className='fb '+(ok?'ok':'ng')+' show';fb.textContent=(ok?'✓ ':'✕ ')+q.fb;const nb=document.getElementById('nextBtn');nb.className='next-btn show';nb.textContent=S.qIdx===LEVELS[S.curLv].quiz.length-1?'결과 보기 →':'다음 →'}
function nextQ(){const quiz=LEVELS[S.curLv].quiz;if(S.qIdx<quiz.length-1){S.qIdx++;renderQ()}else showResult()}function showResult(){const lv=LEVELS[S.curLv],pass=S.qScore>=Math.ceil(lv.quiz.length*.7);if(pass&&!S.done.includes(S.curLv)){S.done.push(S.curLv);S.xp+=lv.xp;save()}document.getElementById('completeIcon').textContent=pass?'🎉':'📚';document.getElementById('completeTag').textContent='LEVEL '+(S.curLv+1)+' · '+(pass?'통과':'미통과');document.getElementById('completeTitle').textContent=pass?'리더 레벨 완료!':'다시 도전해보세요';document.getElementById('completeSub').textContent=pass?`${S.qScore}/${lv.quiz.length} 정답. +${lv.xp} XP를 획득했습니다.`:`${S.qScore}/${lv.quiz.length} 정답. 70% 이상 맞아야 통과입니다.`;document.getElementById('completeXpNum').textContent=S.xp;document.getElementById('completeXpLabel').textContent='XP 누적\n목표 '+MAX_XP+' XP';document.getElementById('failBtn').style.display=pass?'none':'block';updateHeader();show('screenComplete')}
load();showMap();
</script>
