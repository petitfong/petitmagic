<style>
:root{
  --bg:#FAFAF9;--wh:#fff;--tx:#1A1A18;--mu:#888880;--lt:#B8B8B0;
  --g:#007A54;--go:#C8A84B;--br:#E8E8E4;
  --sf:'Noto Serif KR',serif;--ss:'Noto Sans KR',sans-serif
}
html{scroll-behavior:smooth}
.nb{font-size:12px;padding:6px 14px;border-radius:100px;cursor:pointer;text-decoration:none;font-weight:400;font-family:'Pretendard',sans-serif;transition:opacity .15s;margin-left:6px;border:1px solid var(--br);color:var(--mu)}
.nb:hover{border-color:var(--lt);color:var(--tx)}

.inner{max-width:680px;margin:0 auto;padding:0 28px}

/* SEARCH HEADER */
.search-header{padding:52px 0 36px;border-bottom:1px solid var(--br)}
.search-label{font-size:11px;letter-spacing:.14em;color:var(--mu);text-transform:uppercase;margin-bottom:16px}
.search-box{position:relative}
.search-input{width:100%;font-family:'TmonMonsori',serif;font-size:clamp(20px,4vw,28px);font-weight:300;color:var(--tx);background:none;border:none;border-bottom:2px solid var(--tx);outline:none;padding:10px 44px 10px 0;letter-spacing:-.01em}
.search-input::placeholder{color:var(--lt)}
.search-input:focus{border-bottom-color:var(--g)}
.search-clear{position:absolute;right:0;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--lt);display:none;padding:4px}
.search-clear.show{display:block}
.search-count{margin-top:12px;font-size:13px;color:var(--mu)}
.search-count strong{color:var(--tx);font-weight:500}

/* RESULTS */
.results{padding:8px 0 80px}
.result-item{display:grid;grid-template-columns:1fr 72px;gap:16px;align-items:start;padding:22px 0;border-bottom:1px solid var(--br);text-decoration:none;color:inherit;cursor:pointer;transition:opacity .15s}
.result-item:hover{opacity:.65}
.result-item:last-child{border-bottom:none}
.ri-category{font-size:11px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.ri-title{font-family:'TmonMonsori',serif;font-size:clamp(15px,2.5vw,19px);font-weight:400;color:var(--tx);line-height:1.45;margin-bottom:6px;letter-spacing:-.01em}
.ri-title mark{background:none;color:var(--g);font-weight:600}
.ri-desc{font-size:13.5px;color:var(--mu);line-height:1.65}
.ri-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.ri-tag{font-size:11px;color:var(--mu);border:1px solid var(--br);border-radius:100px;padding:2px 9px}
.ri-thumb{width:72px;height:56px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'TmonMonsori',serif;font-size:11px;color:rgba(255,255,255,.7);font-weight:400;letter-spacing:.04em;text-align:center;line-height:1.3}

/* EMPTY / INITIAL */
.empty{text-align:center;padding:60px 0}
.empty-title{font-family:'TmonMonsori',serif;font-size:20px;font-weight:300;color:var(--mu);margin-bottom:12px}
.empty-sub{font-size:13.5px;color:var(--lt);line-height:1.75}
.initial{padding:32px 0}
.init-label{font-size:11px;letter-spacing:.12em;color:var(--mu);text-transform:uppercase;margin-bottom:14px}
.init-tags{display:flex;flex-wrap:wrap;gap:7px}
.init-tag{font-size:13px;color:var(--mu);border:1px solid var(--br);border-radius:100px;padding:5px 14px;cursor:pointer;transition:all .15s}
.init-tag:hover{border-color:var(--g);color:var(--g)}

/* COVER COLORS */
.c-green{background:linear-gradient(160deg,#3a6a4a,#007A54)}
.c-sage{background:linear-gradient(160deg,#6a8a6a,#3a5a3a)}
.c-olive{background:linear-gradient(160deg,#8a9060,#5a6040)}
.c-stone{background:linear-gradient(160deg,#7a7870,#4a4840)}
.c-clay{background:linear-gradient(160deg,#9a7060,#6a4838)}
.c-teal{background:linear-gradient(160deg,#4a7878,#2a4848)}
.c-warm{background:linear-gradient(160deg,#9a8860,#6a5838)}
.c-pine{background:linear-gradient(160deg,#4a6858,#007A54)}

@media(max-width:600px){
  .inner{padding:0 16px}
  .search-header{padding:36px 0 24px}
  .result-item{grid-template-columns:1fr 50px}
  .ri-thumb{width:50px;height:40px}
}

@font-face {
  font-family: 'TmonMonsori';

  font-display: swap;

const fuse = new Fuse(PAGES, {
  keys: [
    {name:'title', weight:3},
    {name:'subtitle', weight:2},
    {name:'tags', weight:2},
    {name:'keywords', weight:1},
    {name:'category', weight:1.5},
  ],
  threshold: 0.4,
  includeScore: true,
  minMatchCharLength: 1,
  ignoreLocation: true,
});

const input = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const resultsArea = document.getElementById('resultsArea');
const searchCount = document.getElementById('searchCount');

input.addEventListener('input', () => {
  const q = input.value.trim();
  clearBtn.classList.toggle('show', q.length > 0);
  if (q.length === 0) {
    showInitial();
    searchCount.innerHTML = '';
    return;
  }
  doSearch(q);
});

function setQuery(q) {
  input.value = q;
  clearBtn.classList.add('show');
  doSearch(q);
}

function clearSearch() {
  input.value = '';
  clearBtn.classList.remove('show');
  searchCount.innerHTML = '';
  showInitial();
  input.focus();
}

function showInitial() {
  resultsArea.innerHTML = `
    <div class="initial">
      <div class="init-label">추천 검색어</div>
      <div class="init-tags">
        ${['교합','자연치아','예방','이악물기','치주염','성장교정','MTA','엠도게인','혀','호흡','레진','보톡스','어린이','중장년','양치질','설소대']
          .map(t=>`<span class="init-tag" onclick="setQuery('${t}')">${t}</span>`).join('')}
      </div>
    </div>`;
}

function doSearch(q) {
  const results = fuse.search(q);
  if (results.length === 0) {
    searchCount.innerHTML = `<strong>"${q}"</strong> 에 대한 결과가 없습니다`;
    resultsArea.innerHTML = `
      <div class="empty">
        <div class="empty-title">검색 결과가 없습니다</div>
        <div class="empty-sub">다른 키워드로 검색해보세요<br>예: 교합, 자연치아, 예방, MTA, 엠도게인</div>
      </div>`;
    return;
  }

  searchCount.innerHTML = `<strong>"${q}"</strong> 검색 결과 ${results.length}건`;

  const html = results.map(({item}) => `
    <a class="result-item" href="${item.url}" target="_blank">
      <div>
        <div class="ri-category">${item.category}</div>
        <div class="ri-title">${highlight(item.title, q)}</div>
        <div class="ri-desc">${highlight(item.subtitle, q)}</div>
        <div class="ri-tags">${item.tags.map(t=>`<span class="ri-tag">${t}</span>`).join('')}</div>
      </div>
      <div class="ri-thumb ${item.color}">${item.category}</div>
    </a>`).join('');

  resultsArea.innerHTML = html;
}

function highlight(text, q) {
  if (!q) return text;
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

// URL 파라미터로 검색어 받기
const urlQ = new URLSearchParams(location.search).get('q');
if (urlQ) {
  input.value = urlQ;
  clearBtn.classList.add('show');
  doSearch(urlQ);
}
</script>
</body>
</html>
