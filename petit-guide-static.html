    sub: "첫 방문 안내",
    answer: `처음 오시는 분들은 충분한 시간을 들여 전체적인 구강 상태를 함께 살펴봅니다.

파노라마 엑스레이, 구강 사진 촬영, 교합 검사를 통해 치아와 잇몸, 턱관절, 교합의 상태를 확인합니다. 단순히 아픈 곳을 찾는 것이 아니라, "왜 이렇게 되었는지"의 원인을 함께 찾습니다.

검사 후에는 현재 상태와 치료 방향을 알기 쉽게 설명해 드리고, 치료 순서와 예상 기간도 함께 안내해 드립니다.

궁금한 것은 무엇이든 편하게 여쭤보세요. 치료 결정은 충분히 이해하신 후에 하셔도 됩니다.`,
    links: [
      { icon: "📝", title: "온라인 사전 문진 작성하기", sub: "내원 전 미리 작성하면 상담이 빨라집니다", url: "petit_dental_complete.html" }
    ]
  }
];
// ============================================================
//  ✏️  답변 수정 구역 끝
// ============================================================

let currentQ = "";
let currentA = "";

// 버튼 렌더링
const grid = document.getElementById('q-grid');
QUESTIONS.forEach((q, i) => {
  const btn = document.createElement('button');
  btn.className = 'q-btn';
  btn.innerHTML = `<div class="ql">${q.label}</div><div class="qs">${q.sub}</div>`;
  btn.onclick = () => show(i);
  grid.appendChild(btn);
});

document.getElementById('share-hint').textContent =
  navigator.share ? '카카오톡 앱이 열립니다' : '텍스트가 복사됩니다 — 카톡에 붙여넣기 하세요';

function show(i) {
  const q = QUESTIONS[i];
  currentQ = q.label;
  currentA = q.answer;
  document.getElementById('question-view').style.display = 'none';
  document.getElementById('response-view').style.display = 'block';
  document.getElementById('q-bubble').textContent = q.label;
  document.getElementById('answer-text').textContent = q.answer;

  // 관련 링크 렌더링
  const relBox = document.getElementById('rel-box');
  if (q.links && q.links.length > 0) {
    relBox.innerHTML = `<div class="rel-label">관련 자료 더 보기</div>` +
      q.links.map(l => `
        <a class="rel-link" href="${l.url}" target="_blank">
          <div class="rel-link-icon">${l.icon}</div>
          <div class="rel-link-body">
            <div class="rel-link-title">${l.title}</div>
            <div class="rel-link-sub">${l.sub}</div>
          </div>
          <div class="rel-link-arr">→</div>
        </a>`).join('');
    relBox.style.display = 'block';
  } else {
    relBox.innerHTML = '';
    relBox.style.display = 'none';
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function reset() {
  document.getElementById('question-view').style.display = 'block';
  document.getElementById('response-view').style.display = 'none';
  const btn = document.getElementById('share-btn');
  btn.classList.remove('copied');
  btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="flex-shrink:0"><path d="M12 3C6.48 3 2 6.92 2 11.76c0 2.96 1.6 5.59 4.08 7.27L5 21l2.42-1.29c1.47.41 3.02.63 4.58.63 5.52 0 10-3.92 10-8.76C22 6.92 17.52 3 12 3z" fill="#3A1D1D"/></svg>카카오톡으로 결과 보내기`;
}

async function shareResult() {
  const shareText = `💚 쁘띠치과 진료 안내\n\n${currentQ}\n\n${currentA}\n\n─────────────────\n📍 대구시 남구 대봉로 66 2층\n📞 053-472-2828\n예약: https://booking.naver.com/booking/13/bizes/743904\n카카오: https://pf.kakao.com/_xbhXYb`;
  const btn = document.getElementById('share-btn');
  if (navigator.share) {
    try { await navigator.share({ title: '쁘띠치과 진료 안내', text: shareText }); } catch {}
  } else {
    try {
      await navigator.clipboard.writeText(shareText);
      btn.classList.add('copied');
      btn.textContent = '✓ 복사됐어요 — 카톡에 붙여넣기 하세요';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="flex-shrink:0"><path d="M12 3C6.48 3 2 6.92 2 11.76c0 2.96 1.6 5.59 4.08 7.27L5 21l2.42-1.29c1.47.41 3.02.63 4.58.63 5.52 0 10-3.92 10-8.76C22 6.92 17.52 3 12 3z" fill="#3A1D1D"/></svg>카카오톡으로 결과 보내기`;
      }, 2500);
    } catch {}
  }
}
</script>
